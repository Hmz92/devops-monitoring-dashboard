name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov -r Day5/devops-monitor/requirements.txt

      - name: Run lint
        run: |
          cd Day5/devops-monitor
          make lint

      - name: Run tests
        run: |
          cd Day5/devops-monitor
          make test

  build:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and Push API Image
        run: |
          cd Day5/devops-monitor
          docker build -f api/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest

      - name: Build and Push Dashboard Image
        run: |
          cd Day5/devops-monitor
          docker build -f dashboard/Dockerfile -t ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v1
        with:
          azcliversion: 2.50.0
          inlineScript: |
            az extension add --name containerapp --yes
            az containerapp update \
              --name devops-monitor-api \
              --resource-group devops-monitor-rg \
              --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-api:latest
            az containerapp update \
              --name devops-monitor-dashboard \
              --resource-group devops-monitor-rg \
              --image ${{ secrets.ACR_NAME }}.azurecr.io/devops-monitor-dashboard:latest
