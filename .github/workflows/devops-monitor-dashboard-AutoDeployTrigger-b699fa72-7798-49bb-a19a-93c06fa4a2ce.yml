name: Trigger auto deployment for devops-monitor-dashboard

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
      - '**'
      - '.github/workflows/devops-monitor-dashboard-AutoDeployTrigger-b699fa72-7798-49bb-a19a-93c06fa4a2ce.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEVOPSMONITORDASHBOARD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVOPSMONITORDASHBOARD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEVOPSMONITORDASHBOARD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: devopsmonitorhamza.azurecr.io
          registryUsername: ${{ secrets.DEVOPSMONITORDASHBOARD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEVOPSMONITORDASHBOARD_REGISTRY_PASSWORD }}
          containerAppName: devops-monitor-dashboard
          resourceGroup: devops-monitor-rg
          imageToBuild: devopsmonitorhamza.azurecr.io/devops-monitor-dashboard:${{ github.sha }}
          dockerfilePath: dashboard/Dockerfile
